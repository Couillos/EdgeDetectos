services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    command: uvicorn webapp.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      # Keep container's node_modules from being overwritten by the bind-mount
      - /app/webapp/frontend/node_modules
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/symbols')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    working_dir: /app/webapp/frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./webapp/frontend:/app/webapp/frontend
      - /app/webapp/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
